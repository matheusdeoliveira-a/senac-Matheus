var n1 = parseFloat(prompt("Digite a nota do 1° Bimestre"));
var n2 = parseFloat(prompt("Digite a nota do 2° Bimestre"));
var n3 = parseFloat(prompt("Digite a nota do 3° Bimestre"));
var n4 = parseFloat(prompt("Digite a nota do 4° Bimestre"));
var media = (n1 + n2 + n3 + n4) / 4;
if(media > 5){
alert("Aprovado. Boas férias! Sua média foi " + media);
} else if((media == 5) || (media == 4)) { // E se for esse valor
alert("Recuperação! Sua média foi " + media);
} else{
alert("REPROVADO!!! Sua média foi " + media);
