<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Função - Lógica de Programação com JavaScript</title>
</head>
<body>
<h1>Função - Lógica de Programação com JavaScript</h1>
<div id="output"></div>
<script>
var output = document.querySelector("#output");//Relacionado ao id
var mensagem = "";
for(var i = 0; i <= 1001; i++){ //As letras "i" são apenas uma variável, não tem um significado em específico.
mensagem += "i: " + i + "<br>";
}
output.innerHTML = mensagem;// o comando "innerHTML" coloca as coisas dentro da Div.
</script>
</body>
</html>
