<h1>Condicional Loop While - Lógica de Programação com JavaScript</h1>
<p>While, condicional de loop. Repita a condição ENQUANTO for verdadeiro</p>
<script>
var numero = parseFloat(prompt("Digite um número"));
indice = indice = + 1;
var indice = 1;
//repetir até o indice de 9
while(indice <= 9){
document.write(numero + " x " + indice + " = " + (numero * indice) + "<br>");
indice = indice = + 1;
indice = indice + 1;
}
document.write("<br>" + "Tabuada do 2" + "<br><br>");
//observação: garantir que a condição em algum momento seja falso, para garantir o fim do loop e não ser infinito ao ponto de travar o sistema.
</script>
