<!doctype html><html><head>
<meta charset="utf-8">
<title>Condicional Switch Case - Lógica de Programação com JavaScript</title>
</head><body>
<h1>Condicional Switch Case - Lógica de Programação com JavaScript</h1>
<script>
//digitar números de 1 a 6
var n = parseFloat(prompt("Digite um número"));
switch(n){
	case 1:
	alert("Boa escolha do número: " + n);
	break;
	case 2:
	alert("Boa escolha do número: " + n);
	break;
	case 3:
	alert("Boa escolha do número: " + n);
	break;
	case 4:
	alert("Boa escolha do número: " + n);
	break;
	case 5:
	alert("Boa escolha do número: " + n);
	break;
	case 6:
	alert("Boa escolha do número: " + n);
	break;
	//alerta caso não escolha uma opção do Case
	default:
	alert("Escolha números de 1 a 6, você digitou: " + n);
	};
</script></body></html>
