<!doctype html><html><head>
<meta charset="utf-8">
<title>Condicional Loop do...while - Lógica de Programação com JavaScript
</title>
</head><body>
<h1>Condicional Loop do...while - Lógica de Programação com JavaScript</h1>
<p>Condicional de Loop do while executa depois do teste da condição, neste caso a declaração é executada ao menos uma vez.</p>
<script>
var numero = parseFloat(prompt("Digite um número"));
var indice = 0;
do {
document.write(numero + " x " + indice + " = " + (numero * indice) + "<br>");
indice++; //significa que é indice "+ 1"
} while(indice <= 1000)
document.write("Saiu do loop");
</script>
</body>
</html>
