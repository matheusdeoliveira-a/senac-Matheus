<h1>Conversão entre Tipos - Lógica de Programação com JavaScript</h1>
<p>O parseFloat() analisa um valor como um string e retorna o primeiro número. Se não puder ser convertido, NaN será retornado.</p>
<script>
var n1 = prompt("Digite um número");
n1 = parseFloat(n1);
var n2 = prompt("Digite mais um número");
n2 = parseFloat(n2);
alert(typeof n1);
alert(n1 + n2);
</script>
<p>O parseInt() retorna apenas o valor inteiro.</p>
<script>
var n3 = parseInt(prompt("Digite um número"));
alert(n3);
</script><body></html>
